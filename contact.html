<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="images/common/favicon.ico">
    <title>NEXA Partners / お問い合わせ</title>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1 class="logo">
            <a href="index.html">
                <img src="images/common/logo.svg" alt="NEXA Partners">
            </a>
            </h1>
            <nav>
            <ul class="gnav">
                <li><a href="service.html">SERVICE</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="case.html">CASE</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-top">
            <h1>お問い合わせ</h1>
            <hr>
            <p>まずはお気軽にご相談ください。</p>
            <p>業務改善やDX導入について、専門スタッフがご相談を承ります。</p>
        </section>
        <section class="contact-content">
            <div class="stat-container">
                <div class="stat-card">
                    <p>累計支援実績<br>300社以上</p>
                </div>
                <div class="stat-card">
                    <p>相談実績<br>8年間</p>
                </div>
                <div class="stat-card">
                    <p>初回<br>相談無料</p>
                </div>
                <div class="stat-card">
                    <p>オンライン<br>対応可</p>
                </div>
            </div>
            <div class="contact-form">
                <form action="./php/confirm.php" method="post">
                    <div class="form-item">
                        <p>
                            <label for="company">
                                会社名
                            </label>
                            <input id="company" type="text" name="company" required>
                        </p>
                    </div>
                    <div class="form-item">
                        <p>
                            <label for="contact-person">
                                担当者名
                            </label> 
                            <input id="contact-person" type="text" name="username" required>
                        </p>
                    </div>
                    <div class="form-item">
                        <p>
                            <label for="email">
                                メールアドレス
                            </label>
                            <input id="email" type="email" name="email" required>
                        </p>
                    </div>
                    <div class="form-item">
                        <p>
                            <label for="tel">
                                電話番号
                            </label>
                            <input id="tel" type="tel" name="tel" required>
                        </p>
                    </div>
                    <div class="form-item">
                        <fieldset>
                            <legend>
                                相談したい内容
                            </legend>
                            <div class="checkbox-list">
                                <label>
                                    <input type="checkbox" name="category[]" value="web">Webサイト制作
                                </label>
                                <label>
                                    <input type="checkbox" name="category[]" value="dx">業務効率化
                                </label>
                                <label>
                                    <input type="checkbox" name="category[]" value="subsidy">補助金サポート
                                </label>
                                <label>
                                    <input type="checkbox" name="category[]" value="other">その他
                                </label>
                            </div>
                        </fieldset>
                    </div>
                    <div class="form-item">
                        <p>
                            <label for="content">
                                ご相談内容
                            </label>
                            <textarea id="content" name="content" rows="5" cols="40" required></textarea>
                        </p>
                    </div>
                    <input type="submit" value="確認画面へ進む">
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-left">
                <img src="images/common/logo_white.svg" alt="NEXA Partners">
                <p>
                    NEXA Partners株式会社<br>
                    鹿児島県鹿児島市○○町1-23
                </p>
            </div>
            <div class="footer-right">
                <p>TEL 000-000-0000</p>
                <p>info@nexa-partners.com</p>
            </div>
        </div>
        <div class="copyright">
            <small>
                ©2026 NEXA Partners
            </small>
        </div>
    </footer>
</body>
</html>
