    <link rel="icon" href="images/common/favicon.ico">

<body>
    <header>
        <div class="header-inner">
            <h1 class="logo">
            <a href="index.html">
                <img src="images/common/logo.svg" alt="NEXA Partners">
            </a>
            </h1>
            <nav>
            <ul class="gnav">
                <li><a href="service.html">SERVICE</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="case.html">CASE</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>お問い合わせ</h1>
        <hr>
        <p>まずはお気軽にご相談ください。</p>
        <p>業務改善やDX導入について、専門スタッフがご相談を承ります。</p>
        <div class="eyecatch">
            <div class="material">
                <p>累計支援実績<br>300社以上</p>
            </div>
            <div class="material">
                <p>相談実績<br>8年間</p>
            </div>
            <div class="material">
                <p>初回<br>相談無料</p>
            </div>
            <div class="material">
                オンライン<br>対応可
            </div>
        </div>
        <div class="form">
            <form action="submit">
                <p>会社名<br>
                    <input type="text" name="company" required>
                </p>
                <p>担当者名<br>
                    <input type="text" name="username" required>
                </p>
                <p>メールアドレス<br>
                    <input type="email" name="email" required>
                </p>
                <p>電話番号<br>
                    <input type="text" name="tel" required>
                </p>
                <p>相談したい内容<br>
                    <label for="category">
                        <input type="checkbox" name="category" value="web"[]>Webサイト制作
                    </label>
                    <label for="category">
                        <input type="checkbox" name="category" value="dx"[]>業務効率化
                    </label>
                    <label for="category">
                        <input type="checkbox" name="category" value="subsidy"[]>補助金サポート
                    </label>
                    <label for="category">
                        <input type="checkbox" name="category" value="web"[]>その他
                    </label>
                </p>
                <p>ご相談内容<br>
                    <textarea name="content" rows="5" cols="40" required></textarea>
                </p>
                <input type="submit" value="送信">
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-left">
                <img src="images/common/logo_white.svg" alt="NEXA Partners">
                <p>
                    NEXA Partners株式会社<br>
                    鹿児島県鹿児島市○○町1-23
                </p>
            </div>
            <div class="footer-right">
                <p>TEL 000-000-0000</p>
                <p>info@nexa-partners.com</p>
            </div>
        </div>
        <div class="copyright">
            <small>
                ©2026 NEXA Partners
            </small>
        </div>
    </footer>
